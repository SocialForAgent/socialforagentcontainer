services:
  learner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sfagent-learner
    volumes:
      - ${HERMES_HOME:-/opt/hermes}:/opt/hermes:ro
      - ./config/learner.json:/opt/sfa-bridge/config.json:ro
      - ./config/blocklist.txt:/opt/sfa-bridge/blocklist.txt:ro
    environment:
      - BRIDGE_INITIAL_MESSAGE=${INITIAL_MSG:-}
    restart: unless-stopped
